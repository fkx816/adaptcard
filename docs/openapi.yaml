openapi: 3.1.0
info:
  title: adaptcard API
  version: 0.2.0
  description: |
    Expanded OpenAPI contract covering the current integration-tested adaptcard API surface.
servers:
  - url: http://127.0.0.1:8787
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service health
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  service: { type: string }

  /knowledge-points:
    post:
      summary: Create a knowledge point
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [front, back]
              properties:
                front: { type: string }
                back: { type: string }
                context: { type: string }
                tags:
                  type: array
                  items: { type: string }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
    get:
      summary: List knowledge points
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100 }
        - in: query
          name: offset
          schema: { type: integer, minimum: 0 }
      responses:
        '200':
          description: List response
          content:
            application/json:
              schema:
                type: object

  /reviews/next:
    get:
      summary: Get next due knowledge point
      responses:
        '200':
          description: Next due
          content:
            application/json:
              schema:
                type: object

  /quiz/generate:
    post:
      summary: Generate quiz questions for a knowledge point
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [knowledgePointId]
              properties:
                knowledgePointId: { type: string }
                count: { type: integer, minimum: 1 }
                pin: { type: boolean }
      responses:
        '201':
          description: Quiz generated
          content:
            application/json:
              schema:
                type: object

  /quiz/submit:
    post:
      summary: Submit quiz answers and update review state
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cardId, answers]
              properties:
                cardId: { type: string }
                reviewSessionId: { type: string }
                answers:
                  type: array
                  items:
                    type: object
                    required: [questionId, userAnswer]
                    properties:
                      questionId: { type: string }
                      userAnswer: { type: string }
      responses:
        '200':
          description: Review result
          content:
            application/json:
              schema:
                type: object

  /review-sessions/start:
    post:
      summary: Start a review session
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                startedAt: { type: string, format: date-time }
                scope:
                  type: object
                  properties:
                    deckId: { type: string }
                    tags:
                      type: array
                      items: { type: string }
                    state:
                      type: string
                      enum: [new, learning, review, relearning, suspended]
                    dueBefore: { type: string, format: date-time }
                    dueAfter: { type: string, format: date-time }
      responses:
        '201':
          description: Session started
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessionId: { type: string }
                  startedAt: { type: string, format: date-time }
                  scope: { type: object, nullable: true }

  /review-sessions/{id}:
    get:
      summary: Get review session detail
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Session detail
          content:
            application/json:
              schema:
                type: object

  /review-sessions/{id}/queue:
    get:
      summary: Get scoped card queue for a review session
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - in: query
          name: offset
          required: false
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        '200':
          description: Scoped queue
          content:
            application/json:
              schema:
                type: object

  /review-sessions/{id}/finish:
    post:
      summary: Finish review session
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Session summary
          content:
            application/json:
              schema:
                type: object

  /review-sessions/{id}/undo-last-review:
    post:
      summary: Undo latest review action in an active session
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Undo result
          content:
            application/json:
              schema:
                type: object

  /decks:
    post:
      summary: Create deck
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                parentId: { type: string }
      responses:
        '201':
          description: Deck created
          content:
            application/json:
              schema:
                type: object
    get:
      summary: List decks
      responses:
        '200':
          description: Deck list
          content:
            application/json:
              schema:
                type: object

  /decks/{id}:
    get:
      summary: Get deck detail
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Deck detail
          content:
            application/json:
              schema:
                type: object
    patch:
      summary: Update deck
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Deck updated
          content:
            application/json:
              schema:
                type: object
    delete:
      summary: Delete deck (leaf only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Deck deleted
          content:
            application/json:
              schema:
                type: object

  /notes:
    post:
      summary: Create note with template-based card generation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [deckId, front, back]
              properties:
                deckId: { type: string }
                front: { type: string }
                back: { type: string }
                tags:
                  type: array
                  items: { type: string }
                cardType:
                  type: string
                  enum: [basic, reverse, cloze]
                  default: basic
      responses:
        '201':
          description: Note created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  cardId: { type: string }
                  cardIds:
                    type: array
                    items: { type: string }
                  cardCount: { type: integer }
    get:
      summary: List notes
      parameters:
        - in: query
          name: deckId
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100 }
        - in: query
          name: offset
          schema: { type: integer, minimum: 0 }
      responses:
        '200':
          description: Note list
          content:
            application/json:
              schema:
                type: object

  /cards:
    get:
      summary: List cards with browser-style query options
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: deckId
          schema: { type: string }
        - in: query
          name: state
          schema:
            type: string
            enum: [new, learning, review, relearning, suspended]
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [dueAt, reps, lapses, updatedAt]
        - in: query
          name: sortOrder
          schema:
            type: string
            enum: [asc, desc]
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100 }
        - in: query
          name: offset
          schema: { type: integer, minimum: 0 }
      responses:
        '200':
          description: Card page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardListResponse'

  /cards/{id}/suspend:
    post:
      summary: Suspend card
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Updated card state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardStateResponse'

  /cards/{id}/unsuspend:
    post:
      summary: Unsuspend card
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Updated card state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardStateResponse'

  /cards/bulk/move-deck:
    post:
      summary: Move cards to another deck in bulk
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cardIds, deckId]
              properties:
                cardIds:
                  type: array
                  minItems: 1
                  items: { type: string }
                deckId: { type: string }
      responses:
        '200':
          description: Move result
          content:
            application/json:
              schema:
                type: object

  /cards/bulk/retag:
    post:
      summary: Bulk retag cards by note association
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cardIds]
              properties:
                cardIds:
                  type: array
                  minItems: 1
                  items: { type: string }
                addTags:
                  type: array
                  items: { type: string }
                removeTags:
                  type: array
                  items: { type: string }
      responses:
        '200':
          description: Retag result
          content:
            application/json:
              schema:
                type: object

  /cards/filters:
    get:
      summary: List saved card browser filters
      responses:
        '200':
          description: Saved filters
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/SavedCardFilter'
    post:
      summary: Save a card browser filter preset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, query]
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 80
                query:
                  $ref: '#/components/schemas/CardFilterQuery'
      responses:
        '200':
          description: Saved filter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedCardFilter'

  /cards/filters/{id}/apply:
    get:
      summary: Apply saved filter and return result page
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Filtered cards
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CardListResponse'
                  - type: object
                    properties:
                      filter:
                        $ref: '#/components/schemas/SavedCardFilter'

components:
  schemas:
    CardStateResponse:
      type: object
      properties:
        id: { type: string }
        noteId: { type: string }
        deckId: { type: string }
        cardType: { type: string }
        state: { type: string }
        dueAt: { type: string, format: date-time }
        reps: { type: integer }
        lapses: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CardItem:
      type: object
      properties:
        id: { type: string }
        noteId: { type: string }
        deckId: { type: string }
        cardType: { type: string }
        state: { type: string }
        dueAt: { type: string, format: date-time }
        reps: { type: integer }
        lapses: { type: integer }
        front: { type: string }
        back: { type: string }
        tags:
          type: array
          items: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CardFilterQuery:
      type: object
      properties:
        search: { type: string }
        deckId: { type: string }
        state:
          type: string
          enum: [new, learning, review, relearning, suspended]
        sortBy:
          type: string
          enum: [dueAt, reps, lapses, updatedAt]
        sortOrder:
          type: string
          enum: [asc, desc]
        limit: { type: integer, minimum: 1, maximum: 100 }
        offset: { type: integer, minimum: 0 }
    SavedCardFilter:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        query:
          $ref: '#/components/schemas/CardFilterQuery'
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CardListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CardItem'
        page:
          type: object
          properties:
            limit: { type: integer }
            offset: { type: integer }
            total: { type: integer }
